<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineering Intel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f9fa;
            color: #2c3e50;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        
        header {
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e1e8ed;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #718096;
            font-size: 0.95rem;
        }
        
        .last-update {
            color: #a0aec0;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        
        .search-box {
            margin-bottom: 2rem;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            font-size: 0.95rem;
            background: white;
            transition: border-color 0.2s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #4a5568;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e1e8ed;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 0.75rem 1.25rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            color: #718096;
            transition: all 0.2s;
        }
        
        .tab:hover {
            color: #2c3e50;
        }
        
        .tab.active {
            color: #1a202c;
            border-bottom-color: #2c3e50;
            font-weight: 600;
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 0.4rem 0.9rem;
            background: white;
            border: 1px solid #e1e8ed;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #4a5568;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            border-color: #cbd5e0;
            background: #f7fafc;
        }
        
        .filter-btn.active {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }
        
        .stats {
            margin-bottom: 2rem;
            padding: 1rem;
            background: white;
            border-radius: 6px;
            border: 1px solid #e1e8ed;
            font-size: 0.9rem;
            color: #718096;
        }
        
        .stats strong {
            color: #2c3e50;
        }
        
        .filter-info {
            color: #4a5568;
            font-weight: 500;
        }
        
        .article {
            background: white;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }
        
        .article:hover {
            border-color: #cbd5e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .article-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        
        .article-category {
            display: inline-block;
            padding: 0.3rem 0.75rem;
            background: #f7fafc;
            color: #4a5568;
            font-size: 0.75rem;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .article-category.anthropic { background: #ebf4ff; color: #3182ce; }
        .article-category.arxiv { background: #faf5ff; color: #805ad5; }
        .article-category.hn { background: #fff5f5; color: #e53e3e; }
        .article-category.ecosystem { background: #f0fff4; color: #38a169; }
        .article-category.breaking { background: #fffaf0; color: #dd6b20; }
        
        .article-time {
            font-size: 0.85rem;
            color: #a0aec0;
        }
        
        .article-title {
            font-size: 1.35rem;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        
        .article-description {
            color: #4a5568;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        
        .article-link {
            color: #3182ce;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .article-link:hover {
            color: #2c5282;
            text-decoration: underline;
        }
        
        .article-metrics {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #f7fafc;
            font-size: 0.85rem;
            color: #a0aec0;
        }
        
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 3rem;
            padding: 1.5rem;
            background: white;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
        }
        
        .pagination-btn {
            padding: 0.6rem 1.2rem;
            background: white;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #4a5568;
            transition: all 0.2s;
        }
        
        .pagination-btn:hover:not(:disabled) {
            border-color: #cbd5e0;
            background: #f7fafc;
        }
        
        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .pagination-info {
            color: #718096;
            font-size: 0.9rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            color: #718096;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 1.5rem 1rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .article {
                padding: 1.25rem;
            }
            
            .article-title {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Engineering Intel</h1>
            <p class="subtitle">Tools, frameworks & patterns you can actually use</p>
            <p class="last-update" id="lastUpdate">Last update: Loading...</p>
        </header>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search articles..."
            />
        </div>

        <div class="tabs">
            <button class="tab active" data-filter="all" onclick="filterByTime('all')">
                All Articles
            </button>
            <button class="tab" data-filter="week" onclick="filterByTime('week')">
                This Week
            </button>
            <button class="tab" data-filter="today" onclick="filterByTime('today')">
                Today
            </button>
        </div>

        <div class="filters">
            <button onclick="filterCategory('all')" class="filter-btn active">All</button>
            <button onclick="filterCategory('anthropic')" class="filter-btn">Anthropic</button>
            <button onclick="filterCategory('arxiv')" class="filter-btn">arXiv</button>
            <button onclick="filterCategory('hn')" class="filter-btn">Hacker News</button>
            <button onclick="filterCategory('ecosystem')" class="filter-btn">OpenClaw</button>
            <button onclick="filterCategory('breaking')" class="filter-btn">Breaking</button>
        </div>

        <div class="stats">
            Showing <strong id="showingCount">0</strong> of <strong id="totalCount">0</strong> articles
            <span id="filterInfo" class="filter-info"></span>
        </div>

        <div id="content">
            <div class="empty-state">Loading articles...</div>
        </div>

        <div class="pagination">
            <button onclick="previousPage()" id="prevBtn" class="pagination-btn">← Previous</button>
            <div class="pagination-info">
                Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
            </div>
            <button onclick="nextPage()" id="nextBtn" class="pagination-btn">Next →</button>
        </div>
    </div>

    <script>
        let allData = [];
        let filteredData = [];
        let currentCategoryFilter = 'all';
        let currentTimeFilter = 'all';
        let currentSearchTerm = '';
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                allData = data.items;
                document.getElementById('lastUpdate').textContent = `Last update: ${formatTimestamp(data.lastUpdate)}`;
                document.getElementById('totalCount').textContent = allData.length;
                applyFilters();
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<div class="empty-state">Error loading articles. Please refresh.</div>';
            }
        }

        function filterByTime(filter) {
            currentTimeFilter = filter;
            currentPage = 1;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.filter === filter) {
                    tab.classList.add('active');
                }
            });
            
            applyFilters();
        }

        function filterCategory(category) {
            currentCategoryFilter = category;
            currentPage = 1;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            applyFilters();
        }

        function applyFilters() {
            let filtered = [...allData];
            
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekStart = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            if (currentTimeFilter === 'today') {
                filtered = filtered.filter(item => new Date(item.timestamp) >= todayStart);
            } else if (currentTimeFilter === 'week') {
                filtered = filtered.filter(item => new Date(item.timestamp) >= weekStart);
            }
            
            if (currentCategoryFilter !== 'all') {
                filtered = filtered.filter(item => item.category === currentCategoryFilter);
            }
            
            if (currentSearchTerm) {
                const searchLower = currentSearchTerm.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(searchLower) ||
                    item.description.toLowerCase().includes(searchLower) ||
                    item.category.toLowerCase().includes(searchLower)
                );
            }
            
            filteredData = filtered;
            renderItems();
            updateStats();
        }

        function renderItems() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredData.slice(start, end);
            
            if (pageItems.length === 0) {
                document.getElementById('content').innerHTML = 
                    '<div class="empty-state">No articles match your filters.</div>';
                return;
            }

            const html = pageItems.map(item => `
                <article class="article">
                    <div class="article-header">
                        <span class="article-category ${item.category}">${item.category}</span>
                        <span class="article-time">${formatTimestamp(item.timestamp)}</span>
                    </div>
                    <h2 class="article-title">${item.title}</h2>
                    <div class="article-description">${item.description}</div>
                    ${item.link ? `<a href="${item.link}" target="_blank" class="article-link">Read more →</a>` : ''}
                    ${item.metrics ? `<div class="article-metrics">${item.metrics}</div>` : ''}
                </article>
            `).join('');

            document.getElementById('content').innerHTML = html;
            updatePagination();
        }

        function updateStats() {
            document.getElementById('showingCount').textContent = filteredData.length;
            
            let filterText = '';
            if (currentTimeFilter !== 'all') {
                filterText += ` • ${currentTimeFilter === 'today' ? 'Today' : 'This Week'}`;
            }
            if (currentCategoryFilter !== 'all') {
                filterText += ` • ${currentCategoryFilter}`;
            }
            if (currentSearchTerm) {
                filterText += ` • "${currentSearchTerm}"`;
            }
            document.getElementById('filterInfo').textContent = filterText;
        }

        function updatePagination() {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / itemsPerPage));
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderItems();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderItems();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            
            return date.toLocaleDateString();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                currentSearchTerm = e.target.value;
                currentPage = 1;
                applyFilters();
            });
        });

        loadData();
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
