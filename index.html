<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Intelligence | Marcus's Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-breaking { background: #ef4444; color: white; }
        .badge-arxiv { background: #3b82f6; color: white; }
        .badge-hn { background: #ff6600; color: white; }
        .badge-anthropic { background: #8b5cf6; color: white; }
        .badge-ecosystem { background: #10b981; color: white; }
        
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .tab.active {
            border-bottom-color: white;
            font-weight: 600;
        }
        
        .pagination-btn {
            padding: 0.5rem 1rem;
            background: white;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(:disabled) {
            background: #f3f4f6;
            transform: translateY(-2px);
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="card rounded-lg shadow-2xl p-8 mb-6">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🤖 AI Engineering Intel</h1>
            <p class="text-gray-600">Tools, frameworks & patterns you can actually use • Zero noise</p>
            <p class="text-sm text-gray-500 mt-2" id="lastUpdate">Last update: Loading...</p>
        </div>

        <!-- Search -->
        <div class="card rounded-lg shadow-xl p-4 mb-6">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="🔍 Search by title, description, or category..."
                class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-purple-500 focus:outline-none"
            />
        </div>

        <!-- Time Tabs -->
        <div class="card rounded-lg shadow-xl mb-6 overflow-hidden">
            <div class="flex text-white bg-gradient-to-r from-purple-600 to-indigo-600">
                <div class="tab active" data-filter="all" onclick="filterByTime('all')">
                    📚 All News
                </div>
                <div class="tab" data-filter="week" onclick="filterByTime('week')">
                    📅 This Week
                </div>
                <div class="tab" data-filter="today" onclick="filterByTime('today')">
                    ⚡ Today
                </div>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="card rounded-lg shadow-xl p-4 mb-6">
            <div class="flex flex-wrap gap-2">
                <button onclick="filterCategory('all')" class="badge bg-gray-700 text-white hover:bg-gray-800 cursor-pointer active-category">All</button>
                <button onclick="filterCategory('breaking')" class="badge badge-breaking hover:opacity-80 cursor-pointer">🚨 Breaking</button>
                <button onclick="filterCategory('arxiv')" class="badge badge-arxiv hover:opacity-80 cursor-pointer">📄 arXiv</button>
                <button onclick="filterCategory('hn')" class="badge badge-hn hover:opacity-80 cursor-pointer">🔥 Hacker News</button>
                <button onclick="filterCategory('anthropic')" class="badge badge-anthropic hover:opacity-80 cursor-pointer">🤖 Anthropic</button>
                <button onclick="filterCategory('ecosystem')" class="badge badge-ecosystem hover:opacity-80 cursor-pointer">🌐 Ecosystem</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="card rounded-lg shadow-xl p-4 mb-6">
            <p class="text-gray-600 text-sm">
                Showing <span id="showingCount" class="font-bold">0</span> of <span id="totalCount" class="font-bold">0</span> items
                <span id="filterInfo" class="ml-2 text-purple-600"></span>
            </p>
        </div>

        <!-- Content -->
        <div id="content">
            <p class="text-white text-center">Loading intelligence...</p>
        </div>

        <!-- Pagination -->
        <div class="card rounded-lg shadow-xl p-4 mt-6 flex items-center justify-between">
            <button onclick="previousPage()" id="prevBtn" class="pagination-btn">← Previous</button>
            <div class="text-gray-600">
                Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
            </div>
            <button onclick="nextPage()" id="nextBtn" class="pagination-btn">Next →</button>
        </div>
    </div>

    <script>
        let allData = [];
        let filteredData = [];
        let currentCategoryFilter = 'all';
        let currentTimeFilter = 'all';
        let currentSearchTerm = '';
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                allData = data.items;
                document.getElementById('lastUpdate').textContent = `Last update: ${formatTimestamp(data.lastUpdate)}`;
                document.getElementById('totalCount').textContent = allData.length;
                applyFilters();
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<p class="text-white text-center">Error loading data. Please refresh.</p>';
            }
        }

        function filterByTime(filter) {
            currentTimeFilter = filter;
            currentPage = 1;
            
            // Update tab styles
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.filter === filter) {
                    tab.classList.add('active');
                }
            });
            
            applyFilters();
        }

        function filterCategory(category) {
            currentCategoryFilter = category;
            currentPage = 1;
            
            // Update category button styles
            document.querySelectorAll('.badge').forEach(badge => {
                badge.classList.remove('active-category', 'ring-2', 'ring-white');
            });
            event.target.classList.add('active-category', 'ring-2', 'ring-white');
            
            applyFilters();
        }

        function applyFilters() {
            let filtered = [...allData];
            
            // Time filter
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekStart = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            if (currentTimeFilter === 'today') {
                filtered = filtered.filter(item => new Date(item.timestamp) >= todayStart);
            } else if (currentTimeFilter === 'week') {
                filtered = filtered.filter(item => new Date(item.timestamp) >= weekStart);
            }
            
            // Category filter
            if (currentCategoryFilter !== 'all') {
                filtered = filtered.filter(item => item.category === currentCategoryFilter);
            }
            
            // Search filter
            if (currentSearchTerm) {
                const searchLower = currentSearchTerm.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(searchLower) ||
                    item.description.toLowerCase().includes(searchLower) ||
                    item.category.toLowerCase().includes(searchLower)
                );
            }
            
            filteredData = filtered;
            renderItems();
            updateStats();
        }

        function renderItems() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredData.slice(start, end);
            
            if (pageItems.length === 0) {
                document.getElementById('content').innerHTML = 
                    '<div class="card rounded-lg shadow-xl p-8 text-center"><p class="text-gray-600">No items match your filters.</p></div>';
                return;
            }

            const html = pageItems.map(item => `
                <div class="card rounded-lg shadow-xl p-6 mb-4 item hover:shadow-2xl transition-all" data-category="${item.category}">
                    <div class="flex items-start justify-between mb-3">
                        <span class="badge badge-${item.category}">${getCategoryIcon(item.category)} ${item.category.toUpperCase()}</span>
                        <span class="text-sm text-gray-500">${formatTimestamp(item.timestamp)}</span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">${item.title}</h3>
                    ${item.subtitle ? `<p class="text-sm text-gray-600 mb-3">${item.subtitle}</p>` : ''}
                    <p class="text-gray-700 mb-3">${item.description}</p>
                    ${item.link ? `<a href="${item.link}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium">→ Read more</a>` : ''}
                    ${item.metrics ? `<div class="mt-3 text-sm text-gray-500">${item.metrics}</div>` : ''}
                </div>
            `).join('');

            document.getElementById('content').innerHTML = html;
            updatePagination();
        }

        function updateStats() {
            document.getElementById('showingCount').textContent = filteredData.length;
            
            let filterText = '';
            if (currentTimeFilter !== 'all') {
                filterText += `• ${currentTimeFilter === 'today' ? 'Today' : 'This Week'} `;
            }
            if (currentCategoryFilter !== 'all') {
                filterText += `• ${currentCategoryFilter} `;
            }
            if (currentSearchTerm) {
                filterText += `• Search: "${currentSearchTerm}" `;
            }
            document.getElementById('filterInfo').textContent = filterText;
        }

        function updatePagination() {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / itemsPerPage));
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderItems();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderItems();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function getCategoryIcon(category) {
            const icons = {
                'breaking': '🚨',
                'arxiv': '📄',
                'hn': '🔥',
                'anthropic': '🤖',
                'ecosystem': '🌐'
            };
            return icons[category] || '📌';
        }

        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            
            return date.toLocaleDateString();
        }

        // Search input handler
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                currentSearchTerm = e.target.value;
                currentPage = 1;
                applyFilters();
            });
        });

        // Load data on page load
        loadData();

        // Auto-refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
