<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Intelligence | Marcus's Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-breaking { background: #ef4444; color: white; }
        .badge-arxiv { background: #3b82f6; color: white; }
        .badge-hn { background: #ff6600; color: white; }
        .badge-anthropic { background: #8b5cf6; color: white; }
        .badge-ecosystem { background: #10b981; color: white; }
    </style>
</head>
<body class="min-h-screen py-8 px-4">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="card rounded-lg shadow-2xl p-8 mb-6">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🔬 AI Research Intelligence</h1>
            <p class="text-gray-600">Automated monitoring for AI-native engineering • Updated every ~45-60 min</p>
            <p class="text-sm text-gray-500 mt-2" id="lastUpdate">Last update: Loading...</p>
        </div>

        <!-- Filters -->
        <div class="card rounded-lg shadow-xl p-4 mb-6">
            <div class="flex flex-wrap gap-2">
                <button onclick="filterCategory('all')" class="badge bg-gray-700 text-white hover:bg-gray-800 cursor-pointer">All</button>
                <button onclick="filterCategory('breaking')" class="badge badge-breaking hover:opacity-80 cursor-pointer">🚨 Breaking</button>
                <button onclick="filterCategory('arxiv')" class="badge badge-arxiv hover:opacity-80 cursor-pointer">📄 arXiv</button>
                <button onclick="filterCategory('hn')" class="badge badge-hn hover:opacity-80 cursor-pointer">🔥 Hacker News</button>
                <button onclick="filterCategory('anthropic')" class="badge badge-anthropic hover:opacity-80 cursor-pointer">🤖 Anthropic</button>
                <button onclick="filterCategory('ecosystem')" class="badge badge-ecosystem hover:opacity-80 cursor-pointer">🌐 Ecosystem</button>
            </div>
        </div>

        <!-- Content -->
        <div id="content">
            <p class="text-white text-center">Loading intelligence...</p>
        </div>
    </div>

    <script>
        let allData = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                allData = data.items;
                document.getElementById('lastUpdate').textContent = `Last update: ${data.lastUpdate}`;
                renderItems();
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<p class="text-white text-center">Error loading data. Please refresh.</p>';
            }
        }

        function filterCategory(category) {
            currentFilter = category;
            renderItems();
        }

        function renderItems() {
            const filtered = currentFilter === 'all' 
                ? allData 
                : allData.filter(item => item.category === currentFilter);

            if (filtered.length === 0) {
                document.getElementById('content').innerHTML = 
                    '<div class="card rounded-lg shadow-xl p-8 text-center"><p class="text-gray-600">No items in this category yet.</p></div>';
                return;
            }

            const html = filtered.map(item => `
                <div class="card rounded-lg shadow-xl p-6 mb-4 item" data-category="${item.category}">
                    <div class="flex items-start justify-between mb-3">
                        <span class="badge badge-${item.category}">${getCategoryIcon(item.category)} ${item.category.toUpperCase()}</span>
                        <span class="text-sm text-gray-500">${formatTimestamp(item.timestamp)}</span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">${item.title}</h3>
                    ${item.subtitle ? `<p class="text-sm text-gray-600 mb-3">${item.subtitle}</p>` : ''}
                    <p class="text-gray-700 mb-3">${item.description}</p>
                    ${item.link ? `<a href="${item.link}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium">→ Read more</a>` : ''}
                    ${item.metrics ? `<div class="mt-3 text-sm text-gray-500">${item.metrics}</div>` : ''}
                </div>
            `).join('');

            document.getElementById('content').innerHTML = html;
        }

        function getCategoryIcon(category) {
            const icons = {
                'breaking': '🚨',
                'arxiv': '📄',
                'hn': '🔥',
                'anthropic': '🤖',
                'ecosystem': '🌐'
            };
            return icons[category] || '📌';
        }

        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            
            return date.toLocaleDateString();
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
